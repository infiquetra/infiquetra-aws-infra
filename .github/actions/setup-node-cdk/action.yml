name: 'Setup Node.js and AWS CDK CLI'
description: 'Install Node.js and AWS CDK CLI globally'
author: 'Infiquetra LLC'

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '18'
  cdk-version:
    description: 'AWS CDK CLI version to install (latest or specific version)'
    required: false
    default: 'latest'

outputs:
  node-version:
    description: 'Node.js version that was installed'
    value: ${{ steps.setup-node.outputs.node-version }}
  cdk-version:
    description: 'AWS CDK CLI version that was installed'
    value: ${{ steps.install-cdk.outputs.cdk-version }}

runs:
  using: 'composite'
  steps:
    - name: 🟢 Set up Node.js
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: 🏗️ Install AWS CDK CLI
      id: install-cdk
      shell: bash
      run: |
        if [ "${{ inputs.cdk-version }}" = "latest" ]; then
          npm install -g aws-cdk
        else
          npm install -g aws-cdk@${{ inputs.cdk-version }}
        fi

        # Get CDK version for output
        CDK_VERSION=$(cdk --version | cut -d' ' -f1)
        echo "cdk-version=$CDK_VERSION" >> $GITHUB_OUTPUT
        echo "✅ Installed AWS CDK CLI version: $CDK_VERSION"
