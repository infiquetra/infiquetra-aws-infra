name: 'Setup Python with uv'
description: 'Install Python, cache dependencies, and install uv package manager'
author: 'Infiquetra LLC'

inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '3.13'

outputs:
  python-version:
    description: 'Python version that was installed'
    value: ${{ steps.setup-python.outputs.python-version }}
  uv-version:
    description: 'uv version that was installed'
    value: ${{ steps.install-uv.outputs.uv-version }}
  cache-hit:
    description: 'Whether the cache was hit'
    value: ${{ steps.cache-deps.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: 🐍 Set up Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: 📦 Cache Python dependencies
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: ⚡ Install uv
      id: install-uv
      shell: bash
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

        # Get uv version for output
        UV_VERSION=$("$HOME/.local/bin/uv" --version | cut -d' ' -f2)
        echo "uv-version=$UV_VERSION" >> $GITHUB_OUTPUT
        echo "✅ Installed uv version: $UV_VERSION"

    - name: 📦 Install dependencies with uv
      shell: bash
      run: |
        uv sync --dev
        echo "✅ Dependencies installed successfully"
